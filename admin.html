<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Devaloy Mandir</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Manrope:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="stylesheet" href="style/main.css">
    <link rel="stylesheet" href="style/admin.css">
</head>
<body class="admin-body">
    <div id="app">
        <!-- Login Page -->
        <div id="loginPage" class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>Admin Access</h1>
                    <p>Devaloy Mandir Event Management</p>
                </div>
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="adminToken">Admin Token</label>
                        <input
                            type="password"
                            id="adminToken"
                            placeholder="Enter admin token"
                            required
                        >
                    </div>
                    <div class="form-group checkbox-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberToken">
                            <span>Remember me on this device</span>
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                </form>
                <div class="login-footer">
                    <a href="index.html" class="back-link">← Back to Main Site</a>
                </div>
                <div id="loginError" class="error-message" style="display: none;"></div>
            </div>
        </div>

        <!-- Admin Dashboard -->
        <div id="dashboard" class="dashboard" style="display: none;">
            <nav class="admin-nav">
                <div class="nav-brand">
                    <h2>Admin Panel</h2>
                    <span class="admin-badge">Devaloy Mandir</span>
                </div>
                <div class="nav-actions">
                    <a href="index.html" class="nav-link" target="_blank">View Site</a>
                    <button id="logoutBtn" class="btn btn-secondary">Logout</button>
                </div>
            </nav>

            <main class="admin-main">
                <div class="admin-header-content">
                    <h1>Event Management</h1>
                    <button id="addEventBtn" class="btn btn-primary">
                        <span class="material-symbols-outlined">add</span>
                        Add New Event
                    </button>
                </div>

                <div class="events-section">
                    <div class="section-header">
                        <h2>All Events</h2>
                        <div class="events-count" id="eventsCount">0 events</div>
                    </div>
                    <div id="eventsGrid" class="events-grid-admin">
                        <!-- Events will be loaded here -->
                    </div>
                    <div id="noEvents" class="empty-state" style="display: none;">
                        <div class="empty-icon">📅</div>
                        <h3>No events yet</h3>
                        <p>Create your first event to get started</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Event</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="eventForm" class="event-form">
                <input type="hidden" id="eventId">
                <input type="hidden" id="eventImage">

                <div class="form-row">
                    <div class="form-group">
                        <label for="eventTitle">Subject *</label>
                        <input
                            type="text"
                            id="eventTitle"
                            placeholder="Event title/subject"
                            required
                        >
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="eventDate">Date *</label>
                        <input
                            type="date"
                            id="eventDate"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="eventTime">Time</label>
                        <input
                            type="text"
                            id="eventTime"
                            placeholder="e.g., 7:00 PM - 8:30 PM"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="eventDescription">Event Description *</label>
                    <textarea
                        id="eventDescription"
                        rows="4"
                        placeholder="Describe the event..."
                        required
                    ></textarea>
                </div>

                <div class="form-group">
                    <label for="eventPhoto">Event Photo</label>
                    <div class="upload-area" id="uploadArea">
                        <input
                            type="file"
                            id="eventPhoto"
                            accept="image/*"
                            style="display: none;"
                        >
                        <div class="upload-content">
                            <span class="material-symbols-outlined upload-icon">cloud_upload</span>
                            <p>Click to upload or drag and drop</p>
                            <p class="upload-hint">PNG, JPG, GIF up to 5MB</p>
                        </div>
                        <div class="upload-preview" id="uploadPreview" style="display: none;">
                            <img id="previewImage" src="" alt="Preview">
                            <button type="button" class="btn-remove" id="removeImage">Remove</button>
                        </div>
                    </div>
                </div>

                <div id="formError" class="error-message" style="display: none;"></div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Event</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <script src="js/admin.js"></script>
</body>
</html>
